<!DOCTYPE html>
<html>
<head>
    <title>Travel Booking</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; text-align: center; }
        .box {
            width: 350px; margin: 100px auto; background: white;
            padding: 20px; border-radius: 10px;
        }
        input { width: 90%; padding: 10px; margin: 5px; }
        button { padding: 10px; background: blue; color: white; border: none; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="box">
    <h2>Search Trips</h2>

    <input type="text" id="source" placeholder="Source"><br>
    <input type="text" id="destination" placeholder="Destination"><br>

    <p id="error" class="error"></p>

    <button onclick="searchTrips()">Search</button>
</div>

<script>
function searchTrips() {

    let source = document.getElementById("source").value;
    let destination = document.getElementById("destination").value;

    // 🔴 BUG 1: Destination not validated
    if (source === "") {
        document.getElementById("error").innerText = "Source required";
        return;
    }

    // 🔴 BUG 2: No validation for numbers/special characters

    localStorage.setItem("searchData", JSON.stringify({ source, destination }));

    window.location.href = "results.html";
}
</script>

</body>
</html>
