<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .box {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .confirm {
            background-color: green;
            color: white;
        }

        .cancel {
            background-color: red;
            color: white;
        }

        .confirm:hover {
            background-color: darkgreen;
        }

        .cancel:hover {
            background-color: darkred;
        }

        #msg {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Booking Details</h2>

    <p id="route"></p>
    <p id="price"></p>

    <button class="confirm" onclick="confirm()">Confirm Booking</button>
    <button class="cancel" onclick="cancel()">Cancel Booking</button>

    <p id="msg"></p>
</div>

<script>

let bookingData = JSON.parse(localStorage.getItem("bookingData"));

if (!bookingData) {
    document.body.innerHTML = "<h2>No Booking Found</h2>";
} else {
    document.getElementById("route").innerText = bookingData.route;
    document.getElementById("price").innerText = "Price: ₹" + bookingData.price;
}

function confirm() {
    bookingData.status = "Confirmed";
    localStorage.setItem("bookingData", JSON.stringify(bookingData));

    document.getElementById("msg").innerText = "Booking Confirmed!";

    setTimeout(() => {
        window.location.href = "itinerary.html";
    }, 1000);
}

function cancel() {

    // 🔴 Intentional bug (keep for QA)
    let refund = bookingData.price - (bookingData.price * 0.2);

    document.getElementById("msg").innerText =
        "Booking Cancelled. Refund: ₹" + refund;

    // 🔴 Bug: status not updated
}

</script>

</body>
</html>
